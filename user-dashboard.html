<!DOCTYPE html>
<html lang="en" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>User Dashboard • Atelier Gallery</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: { brand: { 500: '#5b7cff', 600: '#4367ff' } },
            fontFamily: { sans: ['Inter', 'sans-serif'] }
          }
        }
      };
    </script>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body class="min-h-full bg-slate-950 text-slate-100">
    <div class="mx-auto max-w-7xl px-4 py-6 sm:px-6 lg:px-8">
      <header class="flex flex-wrap items-center justify-between gap-4 rounded-full border border-white/10 bg-slate-900/80 px-4 py-3 glass">
        <div class="flex items-center gap-3 text-sm font-semibold text-white">
          <span class="flex h-9 w-9 items-center justify-center rounded-2xl bg-gradient-to-br from-emerald-500 to-cyan-500 font-bold">U</span>
          User Gallery Portal
        </div>
        <div class="flex items-center gap-3">
          <button id="userLogoutBtn" class="rounded-full border border-white/10 bg-white/10 px-4 py-2 text-sm font-medium text-white transition hover:bg-white/20">Logout</button>
        </div>
      </header>

      <main class="mt-8 space-y-6">
        <section class="rounded-[2rem] border border-white/10 bg-gradient-to-br from-slate-900/90 via-slate-900/70 to-slate-800/80 p-6 glass">
          <p class="text-sm uppercase tracking-[0.35em] text-emerald-200">User dashboard</p>
          <h1 class="mt-2 text-3xl font-semibold text-white">Welcome, <span id="userGreeting">Guest</span>.</h1>
          <p class="mt-3 max-w-2xl text-sm leading-7 text-slate-400">Browse the collection shared by the admin. You can view and download approved media.</p>
        </section>

        <section class="rounded-[2rem] border border-white/10 bg-slate-900/70 p-6 glass">
          <div class="flex flex-col gap-4 lg:flex-row lg:items-end lg:justify-between">
            <div>
              <p class="text-sm font-medium uppercase tracking-[0.3em] text-brand-200">Available media</p>
              <h2 class="mt-2 text-2xl font-semibold text-white">Admin-approved gallery</h2>
            </div>
            <div class="rounded-2xl border border-white/10 bg-white/5 px-4 py-3 text-sm text-slate-400">View-only access for approved content</div>
          </div>
          <div id="userGalleryGrid" class="mt-6 grid gap-4 md:grid-cols-2 xl:grid-cols-3"></div>
        </section>
      </main>
    </div>

    <script src="js/app.js"></script>
  </body>
</html>

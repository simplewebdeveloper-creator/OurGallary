<!DOCTYPE html>
<html lang="en" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Login • Atelier Gallery</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: { brand: { 500: '#5b7cff', 600: '#4367ff' } },
            fontFamily: { sans: ['Inter', 'sans-serif'] }
          }
        }
      };
    </script>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body class="min-h-full bg-[radial-gradient(circle_at_top_left,_rgba(236,72,153,0.18),_transparent_28%),radial-gradient(circle_at_bottom_right,_rgba(14,165,233,0.14),_transparent_22%),linear-gradient(135deg,_#050816_0%,_#081029_45%,_#111827_100%)] text-slate-100">
    <div class="mx-auto flex min-h-screen max-w-6xl flex-col px-4 py-6 sm:px-6 lg:px-8">
      <header class="flex items-center justify-between rounded-full border border-white/10 bg-slate-950/60 px-4 py-3 glass">
        <!-- Fixed broken link tag here -->
        <a href="index.html" class="flex items-center gap-3 text-sm font-semibold text-white">Atelier Gallery</a>
        <a href="auth.html?mode=login" class="rounded-full border border-white/10 bg-white/10 px-3 py-2 text-sm text-slate-100">User Login</a>
      </header>

      <main class="flex flex-1 items-center justify-center py-10">
        <div class="w-full max-w-xl rounded-[2rem] border border-white/10 bg-slate-950/70 p-8 shadow-2xl shadow-slate-950/40 glass">
          <p class="text-sm uppercase tracking-[0.35em] text-brand-200">Admin access</p>
          <h1 class="mt-4 text-3xl font-semibold text-white">Secure admin sign-in</h1>
          <p class="mt-3 text-sm leading-7 text-slate-400">Use the fixed credentials below to enter the administrator dashboard.</p>

          <form id="adminLoginForm" class="mt-6 space-y-4">
            <div>
              <label class="mb-2 block text-sm text-slate-300" for="adminUsername">Username</label>
              <!-- Added name="username" -->
              <input id="adminUsername" name="username" class="w-full rounded-2xl border border-white/10 bg-slate-900/70 px-4 py-3 text-sm text-white outline-none transition focus:border-brand-500" placeholder="" required />
            </div>
            <div>
              <label class="mb-2 block text-sm text-slate-300" for="adminPassword">Password</label>
              <!-- Added name="password" -->
              <input id="adminPassword" name="password" type="password" class="w-full rounded-2xl border border-white/10 bg-slate-900/70 px-4 py-3 text-sm text-white outline-none transition focus:border-brand-500" placeholder="" required />
            </div>
            <button type="submit" class="w-full rounded-2xl bg-gradient-to-r from-brand-600 to-cyan-400 px-4 py-3 text-sm font-semibold text-white transition hover:scale-[1.01]">Sign in as admin</button>
          </form>
          <p id="adminLoginMessage" class="mt-4 text-sm text-slate-400"></p>
        </div>
      </main>
    </div>

    <script>
  document.getElementById('adminLoginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const usernameInput = document.getElementById('adminUsername').value;
    const passwordInput = document.getElementById('adminPassword').value;
    const messageElement = document.getElementById('adminLoginMessage');
    
    messageElement.textContent = "Logging in...";
    messageElement.className = "mt-4 text-sm text-cyan-400";

    try {
      const response = await fetch('/api/admin-login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username: usernameInput, password: passwordInput })
      });

      const data = await response.json();

      if (response.ok) {
        messageElement.textContent = "Success! Redirecting...";
        messageElement.className = "mt-4 text-sm text-green-400";
        // Redirect directly to your admin dashboard file
        setTimeout(() => {
          window.location.href = 'admin-dashboard.html';
        }, 1000);
      } else {
        messageElement.textContent = data.error || "Invalid admin credentials.";
        messageElement.className = "mt-4 text-sm text-red-400";
      }
    } catch (error) {
      console.error("Error:", error);
      messageElement.textContent = "Could not connect to server.";
      messageElement.className = "mt-4 text-sm text-red-400";
    }
  });
</script>

  </body>
</html>
